  - 14.250623  # right_shoulder_yaw
  - 14.250623  # right_elbow
  - 14.250623  # right_wrist_roll
  - 16.778327  # right_wrist_pitch
  - 16.778327  # right_wrist_yaw

# Default per-joint q_target derivative gains.
kd:
  - 6.308802   # left_hip_pitch
  - 6.308802   # left_hip_roll
  - 2.557890   # left_hip_yaw
  - 6.308802   # left_knee
  - 1.814446   # left_ankle_pitch
  - 1.814446   # left_ankle_roll
