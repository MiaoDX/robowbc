<svg width="1600" height="940" viewBox="0 0 1600 940" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RoboWBC codebase architecture</title>
  <desc id="desc">A codebase-derived map of RoboWBC showing TOML configs flowing into the CLI and registry, then through the core WbcPolicy contract, ONNX and PyO3 policy backends, control transports, simulation, visualization, and report artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="20" x2="1560" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="0.58" stop-color="#F6FBF7"/>
      <stop offset="1" stop-color="#FFF7EC"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EAF3FF"/>
      <stop offset="1" stop-color="#F8FBFF"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EAF8EF"/>
      <stop offset="1" stop-color="#F9FDF9"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF0DA"/>
      <stop offset="1" stop-color="#FFF9F2"/>
    </linearGradient>
    <linearGradient id="slate" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2F7"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-16%" width="124%" height="136%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1L11 6L1 11" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1560" height="900" rx="34" fill="url(#bg)"/>

  <g font-family="IBM Plex Sans, Inter, Segoe UI, sans-serif">
    <text x="70" y="78" fill="#122033" font-size="40" font-weight="800">RoboWBC code map</text>
    <text x="70" y="112" fill="#4B5D73" font-size="19" font-weight="500">What actually runs when a contributor changes a config, adds a policy, or builds the report site.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="160" width="300" height="560" rx="22" fill="url(#blue)" stroke="#C9D8EA"/>
    <rect x="430" y="160" width="300" height="560" rx="22" fill="url(#green)" stroke="#C9E0D0"/>
    <rect x="790" y="160" width="340" height="560" rx="22" fill="url(#slate)" stroke="#CBD5E1"/>
    <rect x="1190" y="160" width="340" height="560" rx="22" fill="url(#amber)" stroke="#E7D3BE"/>
    <rect x="70" y="770" width="1460" height="116" rx="22" fill="#FFFFFF" stroke="#D7DEE8"/>
  </g>

  <g font-family="IBM Plex Sans, Inter, Segoe UI, sans-serif">
    <text x="100" y="208" fill="#122033" font-size="25" font-weight="800">Inputs on disk</text>

    <text x="100" y="262" fill="#122033" font-size="19" font-weight="800">configs/*.toml</text>
    <text x="100" y="290" fill="#52657B" font-size="15">[policy] name + config</text>
    <text x="100" y="314" fill="#52657B" font-size="15">[runtime] velocity / schedule / pose</text>
    <text x="100" y="338" fill="#52657B" font-size="15">[comm] 50 Hz topics</text>

    <line x1="100" y1="372" x2="340" y2="372" stroke="#CAD6E3"/>
    <text x="100" y="414" fill="#122033" font-size="19" font-weight="800">configs/robots/*.toml</text>
    <text x="100" y="442" fill="#52657B" font-size="15">joint names, PD gains, limits</text>
    <text x="100" y="466" fill="#52657B" font-size="15">default pose, MJCF path</text>

    <line x1="100" y1="500" x2="340" y2="500" stroke="#CAD6E3"/>
    <text x="100" y="542" fill="#122033" font-size="19" font-weight="800">models/*</text>
    <text x="100" y="570" fill="#52657B" font-size="15">ONNX checkpoints, context files,</text>
    <text x="100" y="594" fill="#52657B" font-size="15">or a Python module for py_model</text>

    <text x="460" y="208" fill="#122033" font-size="25" font-weight="800">Build the policy</text>

    <text x="460" y="262" fill="#122033" font-size="19" font-weight="800">robowbc-cli</text>
    <text x="460" y="290" fill="#52657B" font-size="15">robowbc run --config ...</text>
    <text x="460" y="314" fill="#52657B" font-size="15">build_policy()</text>
    <text x="460" y="338" fill="#52657B" font-size="15">ParsedRuntimeCommand</text>

    <line x1="460" y1="372" x2="700" y2="372" stroke="#C9E0D0"/>
    <text x="460" y="414" fill="#122033" font-size="19" font-weight="800">robowbc-registry</text>
    <text x="460" y="442" fill="#52657B" font-size="15">WbcRegistry::build(name, config)</text>
    <text x="460" y="466" fill="#52657B" font-size="15">inventory::submit!</text>

    <line x1="460" y1="500" x2="700" y2="500" stroke="#C9E0D0"/>
    <text x="460" y="542" fill="#122033" font-size="19" font-weight="800">registered names</text>
    <text x="460" y="570" fill="#52657B" font-size="15">gear_sonic · decoupled_wbc</text>
    <text x="460" y="594" fill="#52657B" font-size="15">wbc_agile · bfm_zero</text>
    <text x="460" y="618" fill="#52657B" font-size="15">hover · wholebody_vla · py_model</text>

    <text x="820" y="208" fill="#122033" font-size="25" font-weight="800">Runtime contract</text>

    <text x="820" y="262" fill="#122033" font-size="19" font-weight="800">robowbc-core</text>
    <text x="820" y="290" fill="#52657B" font-size="15">WbcPolicy::predict(&amp;Observation)</text>
    <text x="820" y="314" fill="#52657B" font-size="15">-&gt; JointPositionTargets</text>

    <line x1="820" y1="348" x2="1100" y2="348" stroke="#CBD5E1"/>
    <text x="820" y="390" fill="#122033" font-size="19" font-weight="800">Observation fields</text>
    <text x="820" y="418" fill="#52657B" font-size="15">joint_positions, joint_velocities</text>
    <text x="820" y="442" fill="#52657B" font-size="15">gravity_vector, angular_velocity</text>
    <text x="820" y="466" fill="#52657B" font-size="15">base_pose, command, timestamp</text>

    <line x1="820" y1="500" x2="1100" y2="500" stroke="#CBD5E1"/>
    <text x="820" y="542" fill="#122033" font-size="19" font-weight="800">WbcCommand variants</text>
    <text x="820" y="570" fill="#52657B" font-size="15">Velocity · MotionTokens</text>
    <text x="820" y="594" fill="#52657B" font-size="15">KinematicPose · EndEffectorPoses</text>
    <text x="820" y="618" fill="#52657B" font-size="15">JointTargets</text>

    <text x="1220" y="208" fill="#122033" font-size="25" font-weight="800">Backends + evidence</text>

    <text x="1220" y="262" fill="#122033" font-size="19" font-weight="800">robowbc-ort</text>
    <text x="1220" y="290" fill="#52657B" font-size="15">OrtBackend, CPU / CUDA / TensorRT</text>
    <text x="1220" y="314" fill="#52657B" font-size="15">public ONNX policy wrappers</text>

    <line x1="1220" y1="348" x2="1500" y2="348" stroke="#E7D3BE"/>
    <text x="1220" y="390" fill="#122033" font-size="19" font-weight="800">robowbc-pyo3</text>
    <text x="1220" y="418" fill="#52657B" font-size="15">PyModelPolicy calls predict(obs)</text>
    <text x="1220" y="442" fill="#52657B" font-size="15">inside the Python GIL</text>

    <line x1="1220" y1="476" x2="1500" y2="476" stroke="#E7D3BE"/>
    <text x="1220" y="518" fill="#122033" font-size="19" font-weight="800">control + report path</text>
    <text x="1220" y="546" fill="#52657B" font-size="15">run_control_tick()</text>
    <text x="1220" y="570" fill="#52657B" font-size="15">RobotTransport / MujocoTransport</text>
    <text x="1220" y="594" fill="#52657B" font-size="15">RerunVisualizer, JSON, HTML site</text>
  </g>

  <g stroke="#64748B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)">
    <line x1="370" y1="440" x2="430" y2="440"/>
    <line x1="730" y1="440" x2="790" y2="440"/>
    <line x1="1130" y1="440" x2="1190" y2="440"/>
  </g>

  <g font-family="IBM Plex Sans, Inter, Segoe UI, sans-serif">
    <text x="100" y="810" fill="#122033" font-size="20" font-weight="800">Smoke path</text>
    <text x="100" y="840" fill="#52657B" font-size="15">configs/decoupled_smoke.toml</text>
    <text x="100" y="862" fill="#52657B" font-size="15">checked-in ONNX fixture + 4-joint mock robot</text>

    <text x="610" y="810" fill="#122033" font-size="20" font-weight="800">Add a model</text>
    <text x="610" y="840" fill="#52657B" font-size="15">WbcPolicy + RegistryPolicy</text>
    <text x="610" y="862" fill="#52657B" font-size="15">WbcRegistration + policy config</text>

    <text x="1090" y="810" fill="#122033" font-size="20" font-weight="800">Add a robot</text>
    <text x="1090" y="840" fill="#52657B" font-size="15">RobotConfig TOML</text>
    <text x="1090" y="862" fill="#52657B" font-size="15">joint order, gains, limits, default pose</text>
  </g>
</svg>
