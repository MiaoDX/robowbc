name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build Rust API docs
        run: cargo doc --workspace --no-deps

      - name: Install mdBook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --directory /usr/local/bin

      - name: Build docs
        run: mdbook build

  showcase:
    name: Policy showcase (HTML + Rerun)
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache live policy checkpoints
        uses: actions/cache@v4
        with:
          path: |
            models/gear-sonic
            models/decoupled-wbc
            models/wbc-agile
            models/bfm_zero
          key: live-policy-models-${{ runner.os }}-v3

      - name: Install BFM-Zero asset prep dependencies
        run: pip install numpy joblib

      - name: Warm live policy checkpoint cache
        run: |
          bash scripts/download_gear_sonic_models.sh models/gear-sonic
          bash scripts/download_decoupled_wbc_models.sh models/decoupled-wbc
          bash scripts/download_wbc_agile_models.sh models/wbc-agile
          bash scripts/download_bfm_zero_models.sh models/bfm_zero

      - name: Build robowbc with vis feature
        run: cargo build --bin robowbc --features robowbc-cli/vis

      - name: Generate mixed-source policy showcase
        run: |
          python scripts/generate_policy_showcase.py \
            --repo-root . \
            --robowbc-binary ./target/debug/robowbc \
            --output-dir /tmp/policy-showcase

      - name: Upload policy showcase artifact
        uses: actions/upload-artifact@v4
        with:
          name: policy-showcase
          path: /tmp/policy-showcase
          retention-days: 30

  python-sdk:
    runs-on: ubuntu-latest
    # ORT binary download can be flaky on cold CI caches; mark non-blocking
    # until the cache is warm. The Rust job validates the Rust code correctness.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build manylinux wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist -i python3.12
          manylinux: auto

      - name: Install robowbc wheel
        run: pip install dist/*.whl

      - name: Python smoke test
        run: |
          python - <<'EOF'
          from robowbc import Observation, Registry

          # Verify policy list is non-empty
          names = Registry.list_policies()
          assert len(names) > 0, f"expected at least one policy, got: {names}"
          print("Registered policies:", names)

          # Verify Observation construction
          obs = Observation(
              joint_positions=[0.0] * 4,
              joint_velocities=[0.0] * 4,
              gravity_vector=[0.0, 0.0, -1.0],
              command_type="motion_tokens",
              command_data=[0.1, 0.2],
          )
          assert obs.joint_positions == [0.0] * 4
          assert obs.command_type == "motion_tokens"
          print("Observation:", obs)

          # Verify build_from_str raises on unknown policy
          try:
              Registry.build_from_str('[policy]\nname = "no_such_policy"')
              assert False, "should have raised"
          except RuntimeError as e:
              assert "unknown policy" in str(e).lower(), f"unexpected error: {e}"

          print("All smoke tests passed.")
          EOF
