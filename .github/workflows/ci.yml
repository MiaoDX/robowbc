name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build Rust API docs
        run: cargo doc --workspace --no-deps

      - name: Install mdBook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --directory /usr/local/bin

      - name: Build docs
        run: mdbook build

  showcase:
    name: Policy showcase (HTML + MuJoCo + Rerun)
    runs-on: ubuntu-latest
    needs: rust
    env:
      MUJOCO_DOWNLOAD_DIR: /tmp/mujoco
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache live policy checkpoints
        uses: actions/cache@v4
        with:
          path: |
            models/gear-sonic
            models/decoupled-wbc
            models/wbc-agile
            models/bfm_zero
          key: live-policy-models-${{ runner.os }}-v3

      - name: Install site-build Python dependencies
        run: pip install numpy joblib onnxruntime==1.24.4 pyyaml mujoco Pillow

      - name: Warm live policy checkpoint cache
        run: |
          bash scripts/download_gear_sonic_models.sh models/gear-sonic
          bash scripts/download_decoupled_wbc_models.sh models/decoupled-wbc
          bash scripts/download_wbc_agile_models.sh models/wbc-agile
          bash scripts/download_bfm_zero_models.sh models/bfm_zero

      - name: Build RoboWBC site
        run: |
          python scripts/build_site.py \
            --repo-root . \
            --robowbc-binary ./target/debug/robowbc \
            --output-dir /tmp/robowbc-site

      - name: Smoke-check generated site bundle
        run: |
          test -f /tmp/robowbc-site/index.html
          test -f /tmp/robowbc-site/manifest.json
          test -f /tmp/robowbc-site/assets/rerun-web-viewer/index.js
          test -f /tmp/robowbc-site/policies/gear_sonic/index.html
          test -f /tmp/robowbc-site/benchmarks/nvidia/index.html
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path("/tmp/robowbc-site")
          manifest = json.loads((root / "manifest.json").read_text(encoding="utf-8"))
          assert manifest, "site manifest is empty"
          assert all("detail_page" in entry for entry in manifest), "detail_page missing from manifest"

          detail_dirs = [root / entry["detail_page"] for entry in manifest]
          assert all((path / "index.html").is_file() for path in detail_dirs), "missing policy detail page"

          ok_entries = [entry for entry in manifest if entry.get("status") == "ok"]
          assert ok_entries, "expected at least one successful policy entry"

          detail_dir = root / ok_entries[0]["detail_page"]
          detail_text = (detail_dir / "index.html").read_text(encoding="utf-8")
          assert "../../assets/rerun-web-viewer/index.js" in detail_text, "detail page missing rebased viewer path"
          assert 'data-rrd-file="run.rrd"' in detail_text, "detail page missing local run recording path"
          assert "proof_pack_manifest.json" in detail_text, "detail page missing proof-pack manifest reference"

          benchmark_text = (root / "index.html").read_text(encoding="utf-8")
          assert "benchmarks/nvidia/index.html" in benchmark_text, "site home missing benchmark link"
          PY

      - name: Upload NVIDIA benchmark comparison artifact
        uses: actions/upload-artifact@v4
        with:
          name: nvidia-benchmark-comparison
          path: /tmp/robowbc-site/benchmarks/nvidia
          retention-days: 30

      - name: Upload RoboWBC site artifact
        uses: actions/upload-artifact@v4
        with:
          name: robowbc-site
          path: /tmp/robowbc-site
          retention-days: 30

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: /tmp/robowbc-site

  deploy-showcase:
    name: Deploy showcase to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [rust, docs, showcase]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4

  python-sdk:
    runs-on: ubuntu-latest
    # ORT binary download can be flaky on cold CI caches; mark non-blocking
    # until the cache is warm. The Rust job validates the Rust code correctness.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build manylinux wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist -i python3.12
          manylinux: auto

      - name: Install robowbc wheel
        run: pip install dist/*.whl

      - name: Python smoke test
        run: |
          python - <<'EOF'
          from robowbc import Observation, Registry

          # Verify policy list is non-empty
          names = Registry.list_policies()
          assert len(names) > 0, f"expected at least one policy, got: {names}"
          print("Registered policies:", names)

          # Verify Observation construction
          obs = Observation(
              joint_positions=[0.0] * 4,
              joint_velocities=[0.0] * 4,
              gravity_vector=[0.0, 0.0, -1.0],
              command_type="motion_tokens",
              command_data=[0.1, 0.2],
          )
          assert obs.joint_positions == [0.0] * 4
          assert obs.command_type == "motion_tokens"
          print("Observation:", obs)

          # Verify build_from_str raises on unknown policy
          try:
              Registry.build_from_str('[policy]\nname = "no_such_policy"')
              assert False, "should have raised"
          except RuntimeError as e:
              assert "unknown policy" in str(e).lower(), f"unexpected error: {e}"

          print("All smoke tests passed.")
          EOF
