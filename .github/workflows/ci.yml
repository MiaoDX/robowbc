name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    env:
      MUJOCO_DOWNLOAD_DIR: /tmp/mujoco
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: make check

      - name: cargo test
        run: make test

      - name: cargo test (MuJoCo sim feature path)
        run: make sim-feature-test

      - name: cargo clippy
        run: make clippy

      - name: cargo fmt --check
        run: make fmt-check

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build Rust API docs
        run: make rust-doc

      - name: Build docs
        run: make docs-book

  showcase:
    name: Policy showcase (HTML + MuJoCo + Rerun)
    runs-on: ubuntu-latest
    needs: rust
    env:
      MUJOCO_DOWNLOAD_DIR: /tmp/mujoco
      MUJOCO_GL: egl
      PYOPENGL_PLATFORM: egl
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install headless MuJoCo EGL runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libegl-mesa0 libgles2 libgl1-mesa-dri libgbm1

      - name: Cache live policy checkpoints
        uses: actions/cache@v4
        with:
          path: |
            models/gear-sonic
            models/decoupled-wbc
            models/wbc-agile
            models/bfm_zero
          key: live-policy-models-${{ runner.os }}-v3

      - name: Build and validate RoboWBC site
        run: make showcase-verify PYTHON=python3 SITE_OUTPUT_DIR=/tmp/robowbc-site MUJOCO_DOWNLOAD_DIR=/tmp/mujoco

      - name: Upload NVIDIA benchmark comparison artifact
        uses: actions/upload-artifact@v4
        with:
          name: nvidia-benchmark-comparison
          path: /tmp/robowbc-site/benchmarks/nvidia
          retention-days: 30

      - name: Upload RoboWBC site artifact
        uses: actions/upload-artifact@v4
        with:
          name: robowbc-site
          path: /tmp/robowbc-site
          retention-days: 30

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: /tmp/robowbc-site

  deploy-showcase:
    name: Deploy showcase to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [rust, docs, showcase]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify Python SDK
        run: make python-sdk-verify PYTHON=python3 PYTHON_SDK_MUJOCO_DOWNLOAD_DIR=/tmp/mujoco
