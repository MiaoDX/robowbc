name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build Rust API docs
        run: cargo doc --workspace --no-deps

      - name: Install mdBook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --directory /usr/local/bin

      - name: Build docs
        run: mdbook build

  showcase:
    name: Policy showcase (HTML + MuJoCo + Rerun)
    runs-on: ubuntu-latest
    needs: rust
    env:
      MUJOCO_DOWNLOAD_DIR: /tmp/mujoco
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache live policy checkpoints
        uses: actions/cache@v4
        with:
          path: |
            models/gear-sonic
            models/decoupled-wbc
            models/wbc-agile
            models/bfm_zero
          key: live-policy-models-${{ runner.os }}-v3

      - name: Install showcase and benchmark Python dependencies
        run: pip install numpy joblib onnxruntime==1.24.4 pyyaml

      - name: Warm live policy checkpoint cache
        run: |
          bash scripts/download_gear_sonic_models.sh models/gear-sonic
          bash scripts/download_decoupled_wbc_models.sh models/decoupled-wbc
          bash scripts/download_wbc_agile_models.sh models/wbc-agile
          bash scripts/download_bfm_zero_models.sh models/bfm_zero

      - name: Ensure MuJoCo runtime is present for cached sim builds
        run: |
          set -euxo pipefail
          mujoco_version="3.6.0"
          case "$(uname -m)" in
            x86_64|amd64) mujoco_arch="x86_64" ;;
            aarch64|arm64) mujoco_arch="aarch64" ;;
            *)
              echo "unsupported runner architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac

          mujoco_root="${MUJOCO_DOWNLOAD_DIR}/mujoco-${mujoco_version}"
          mujoco_lib="${mujoco_root}/lib/libmujoco.so"
          if [ -f "${mujoco_lib}" ]; then
            exit 0
          fi

          archive="mujoco-${mujoco_version}-linux-${mujoco_arch}.tar.gz"
          archive_path="/tmp/${archive}"
          checksum_path="${archive_path}.sha256"
          base_url="https://github.com/google-deepmind/mujoco/releases/download/${mujoco_version}"

          mkdir -p "${MUJOCO_DOWNLOAD_DIR}"
          curl -fsSL "${base_url}/${archive}" -o "${archive_path}"
          curl -fsSL "${base_url}/${archive}.sha256" -o "${checksum_path}"

          expected_sha="$(cut -d' ' -f1 < "${checksum_path}")"
          actual_sha="$(sha256sum "${archive_path}" | cut -d' ' -f1)"
          if [ "${expected_sha}" != "${actual_sha}" ]; then
            echo "MuJoCo archive checksum mismatch" >&2
            exit 1
          fi

          tar -xzf "${archive_path}" -C "${MUJOCO_DOWNLOAD_DIR}"
          test -f "${mujoco_lib}"

      - name: Build robowbc with sim + vis showcase features
        run: cargo build --bin robowbc --features robowbc-cli/sim-auto-download,robowbc-cli/vis

      - name: Generate mixed-source policy showcase
        run: |
          python scripts/generate_policy_showcase.py \
            --repo-root . \
            --robowbc-binary ./target/debug/robowbc \
            --output-dir /tmp/policy-showcase

      - name: Generate NVIDIA comparison HTML
        run: |
          bash scripts/bench_robowbc_compare.sh --all
          python scripts/bench_nvidia_official.py --all
          mkdir -p /tmp/policy-showcase/benchmarks
          cp -R artifacts/benchmarks/nvidia /tmp/policy-showcase/benchmarks/nvidia
          python scripts/render_nvidia_benchmark_summary.py \
            --root /tmp/policy-showcase/benchmarks/nvidia \
            --output /tmp/policy-showcase/benchmarks/nvidia/SUMMARY.md \
            --html-output /tmp/policy-showcase/benchmarks/nvidia/index.html

      - name: Upload NVIDIA benchmark comparison artifact
        uses: actions/upload-artifact@v4
        with:
          name: nvidia-benchmark-comparison
          path: /tmp/policy-showcase/benchmarks/nvidia
          retention-days: 30

      - name: Upload policy showcase artifact
        uses: actions/upload-artifact@v4
        with:
          name: policy-showcase
          path: /tmp/policy-showcase
          retention-days: 30

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: /tmp/policy-showcase

  deploy-showcase:
    name: Deploy showcase to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [rust, docs, showcase]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4

  python-sdk:
    runs-on: ubuntu-latest
    # ORT binary download can be flaky on cold CI caches; mark non-blocking
    # until the cache is warm. The Rust job validates the Rust code correctness.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build manylinux wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist -i python3.12
          manylinux: auto

      - name: Install robowbc wheel
        run: pip install dist/*.whl

      - name: Python smoke test
        run: |
          python - <<'EOF'
          from robowbc import Observation, Registry

          # Verify policy list is non-empty
          names = Registry.list_policies()
          assert len(names) > 0, f"expected at least one policy, got: {names}"
          print("Registered policies:", names)

          # Verify Observation construction
          obs = Observation(
              joint_positions=[0.0] * 4,
              joint_velocities=[0.0] * 4,
              gravity_vector=[0.0, 0.0, -1.0],
              command_type="motion_tokens",
              command_data=[0.1, 0.2],
          )
          assert obs.joint_positions == [0.0] * 4
          assert obs.command_type == "motion_tokens"
          print("Observation:", obs)

          # Verify build_from_str raises on unknown policy
          try:
              Registry.build_from_str('[policy]\nname = "no_such_policy"')
              assert False, "should have raised"
          except RuntimeError as e:
              assert "unknown policy" in str(e).lower(), f"unexpected error: {e}"

          print("All smoke tests passed.")
          EOF
