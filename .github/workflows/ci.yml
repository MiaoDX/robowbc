name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --directory /usr/local/bin

      - name: Build docs
        run: mdbook build

  snapshot:
    name: Policy snapshots (Rerun .rrd)
    runs-on: ubuntu-latest
    # Requires the Rust job to pass first so we know the code compiles.
    needs: rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build robowbc with vis feature
        run: cargo build --bin robowbc --features robowbc-cli/vis

      - name: Write snapshot config (decoupled_wbc, 200 ticks, headless .rrd)
        run: |
          cat > /tmp/snapshot_decoupled.toml << 'EOF'
          [policy]
          name = "decoupled_wbc"

          [policy.config.rl_model]
          model_path = "crates/robowbc-ort/tests/fixtures/test_dynamic_identity.onnx"
          execution_provider = { type = "cpu" }
          optimization_level = "extended"
          num_threads = 1

          [policy.config]
          lower_body_joints = [0, 1]
          upper_body_joints = [2, 3]
          control_frequency_hz = 50

          [robot]
          config_path = "configs/robots/unitree_g1_mock.toml"

          [comm]
          frequency_hz = 50

          [runtime]
          velocity = [0.2, 0.0, 0.1]
          max_ticks = 200

          [vis]
          app_id = "robowbc-ci-decoupled_wbc"
          spawn_viewer = false
          save_path = "/tmp/decoupled_wbc.rrd"
          EOF

      - name: Record decoupled_wbc snapshot
        run: cargo run --bin robowbc --features robowbc-cli/vis -- run --config /tmp/snapshot_decoupled.toml

      - name: Upload .rrd artifacts
        uses: actions/upload-artifact@v4
        with:
          name: policy-snapshots
          path: /tmp/*.rrd
          retention-days: 30

  python-sdk:
    runs-on: ubuntu-latest
    # ORT binary download can be flaky on cold CI caches; mark non-blocking
    # until the cache is warm. The Rust job validates the Rust code correctness.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build manylinux wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out /tmp/robowbc-dist
          manylinux: auto

      - name: Install robowbc wheel
        run: pip install /tmp/robowbc-dist/*.whl

      - name: Python smoke test
        run: |
          python - <<'EOF'
          from robowbc import Observation, Registry

          # Verify policy list is non-empty
          names = Registry.list_policies()
          assert len(names) > 0, f"expected at least one policy, got: {names}"
          print("Registered policies:", names)

          # Verify Observation construction
          obs = Observation(
              joint_positions=[0.0] * 4,
              joint_velocities=[0.0] * 4,
              gravity_vector=[0.0, 0.0, -1.0],
              command_type="motion_tokens",
              command_data=[0.1, 0.2],
          )
          assert obs.joint_positions == [0.0] * 4
          assert obs.command_type == "motion_tokens"
          print("Observation:", obs)

          # Verify build_from_str raises on unknown policy
          try:
              Registry.build_from_str('[policy]\nname = "no_such_policy"')
              assert False, "should have raised"
          except RuntimeError as e:
              assert "unknown policy" in str(e).lower(), f"unexpected error: {e}"

          print("All smoke tests passed.")
          EOF
