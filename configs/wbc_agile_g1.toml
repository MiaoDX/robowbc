# WBC-AGILE policy configuration for Unitree G1 using NVIDIA's published
# recurrent locomotion checkpoint.
#
# Download the public ONNX weight first:
#
#   bash scripts/download_wbc_agile_models.sh
#
# The public G1 checkpoint consumes structured history tensors and returns 14
# lower-body joint targets. RoboWBC maps those outputs back into the 35-DOF G1
# robot ordering and holds the remaining joints at their current positions.

[policy]
name = "wbc_agile"

[policy.config.rl_model]
model_path = "models/wbc-agile/unitree_g1_velocity_e2e.onnx"
execution_provider = { type = "cpu" }
optimization_level = "extended"
num_threads = 1

[policy.config]
contract = "velocity_g1_history"
control_frequency_hz = 50

[robot]
config_path = "configs/robots/unitree_g1_35dof_wbc_agile.toml"

[comm]
frequency_hz = 50
topics = { joint_state = "unitree/g1/joint_state", imu = "unitree/g1/imu", joint_target_command = "unitree/g1/command/joint_position" }

[inference]
backend = "ort"
device = "cpu"

[runtime]
velocity = [0.30, 0.0, 0.0]
max_ticks = 200
