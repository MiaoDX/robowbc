[policy]
name = "gear_sonic"

[policy.config.encoder]
model_path = "models/gear-sonic/model_encoder.onnx"
execution_provider = { type = "cpu" }
optimization_level = "extended"
num_threads = 1

[policy.config.decoder]
model_path = "models/gear-sonic/model_decoder.onnx"
execution_provider = { type = "cpu" }
optimization_level = "extended"
num_threads = 1

[policy.config.planner]
model_path = "models/gear-sonic/planner_sonic.onnx"
execution_provider = { type = "cpu" }
optimization_level = "extended"
num_threads = 1

[robot]
config_path = "configs/robots/unitree_g1.toml"

[comm]
frequency_hz = 50
topics = { joint_state = "unitree/g1/joint_state", imu = "unitree/g1/imu", joint_target_command = "unitree/g1/command/joint_position" }

[runtime]
motion_tokens = [0.05, -0.1, 0.2, 0.0]
max_ticks = 200

# Hardware transport for real Unitree G1.
#
# To run against real hardware:
#   1. Start the zenoh-ros2dds bridge on the G1 network side:
#        zenoh-bridge-ros2dds -c config_g1.json5
#   2. Set zenoh_locator to the bridge IP, e.g. "tcp/192.168.123.18:7447".
#   3. Uncomment and set the [hardware] section below.
#   4. Run: robowbc run --config configs/sonic_g1.toml
#
# Omit this section to use simulation (robowbc-sim) or the synthetic transport.
#
# [hardware]
# zenoh_locator = "tcp/192.168.123.18:7447"
# recv_timeout_ms = 100
