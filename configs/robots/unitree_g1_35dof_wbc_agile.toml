# Unitree G1 35-DOF robot configuration tuned for the public WBC-AGILE G1
# locomotion checkpoint.
#
# This keeps the shared joint ordering, limits, and gain families from the
# standard 35-DOF G1 embodiment, but resets the lower body into the shallower
# locomotion nominal used by the GR00T/Isaac velocity-tracking policies rather
# than the deeper GEAR-Sonic standing pose.
#
# The public WBC-AGILE export controls only the lower-body 14 joints directly.
# The upper body remains fixed at the configured default pose.

