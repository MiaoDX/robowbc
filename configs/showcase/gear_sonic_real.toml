[policy]
name = "gear_sonic"

[policy.config.encoder]
model_path = "models/gear-sonic/model_encoder.onnx"
execution_provider = { type = "cpu" }
optimization_level = "extended"
num_threads = 1

[policy.config.decoder]
model_path = "models/gear-sonic/model_decoder.onnx"
execution_provider = { type = "cpu" }
optimization_level = "extended"
num_threads = 1

[policy.config.planner]
model_path = "models/gear-sonic/planner_sonic.onnx"
execution_provider = { type = "cpu" }
optimization_level = "extended"
num_threads = 1

[robot]
config_path = "configs/robots/unitree_g1_gear_sonic.toml"

[sim]
# Use the reviewed official GEAR-Sonic freebase G1 XML through a local asset
# mirror so the showcase stays on the official robot model without depending on
# unresolved third-party Git LFS mesh pointers.
model_path = "assets/robots/groot_g1_gear_sonic/g1_29dof_old.xml"
timestep = 0.002
substeps = 10
gain_profile = "simulation_pd"

[comm]
frequency_hz = 50
topics = { joint_state = "unitree/g1/joint_state", imu = "unitree/g1/imu", joint_target_command = "unitree/g1/command/joint_position" }

[runtime]
# Staged locomotion demo: stand -> accelerate -> right turn -> run -> settle.
# Negative yaw-rate is the right-turn command in the current showcase setup.
max_ticks = 400

[[runtime.velocity_schedule.segments]]
duration_secs = 2.0
start = [0.0, 0.0, 0.0]
end = [0.6, 0.0, 0.0]

[[runtime.velocity_schedule.segments]]
duration_secs = 1.0
start = [0.6, 0.0, -1.5707964]
end = [0.6, 0.0, -1.5707964]

[[runtime.velocity_schedule.segments]]
duration_secs = 3.0
start = [0.6, 0.0, 0.0]
end = [1.0, 0.0, 0.0]

[[runtime.velocity_schedule.segments]]
duration_secs = 1.0
start = [1.0, 0.0, 0.0]
end = [0.0, 0.0, 0.0]
