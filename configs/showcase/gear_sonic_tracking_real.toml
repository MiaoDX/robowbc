[policy]
name = "gear_sonic"

[policy.config.encoder]
model_path = "models/gear-sonic/model_encoder.onnx"
execution_provider = { type = "cpu" }
optimization_level = "extended"
num_threads = 1

[policy.config.decoder]
model_path = "models/gear-sonic/model_decoder.onnx"
execution_provider = { type = "cpu" }
optimization_level = "extended"
num_threads = 1

[policy.config.planner]
model_path = "models/gear-sonic/planner_sonic.onnx"
execution_provider = { type = "cpu" }
optimization_level = "extended"
num_threads = 1

[policy.config.reference_motion]
clip_dir = "models/gear-sonic/reference/example/macarena_001__A545"
auto_play = true
loop_playback = false

[robot]
config_path = "configs/robots/unitree_g1_gear_sonic.toml"

[sim]
# Match the official GEAR-Sonic old freebase G1 robot model used by the public
# deploy stack. This keeps the tracking proof pack on the same reviewed
# embodiment as the velocity showcase card.
model_path = "assets/robots/groot_g1_gear_sonic/g1_29dof_old.xml"
timestep = 0.002
substeps = 10
gain_profile = "simulation_pd"

[comm]
frequency_hz = 50
topics = { joint_state = "unitree/g1/joint_state", imu = "unitree/g1/imu", joint_target_command = "unitree/g1/command/joint_position" }

[runtime]
# Official upper-body/reference demo: autoplay the pinned macarena clip.
reference_motion_tracking = true
max_ticks = 400
