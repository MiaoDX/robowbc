[policy]
name = "wbc_agile"

[policy.config.rl_model]
model_path = "models/wbc-agile/unitree_g1_velocity_e2e.onnx"
execution_provider = { type = "cpu" }
optimization_level = "extended"
num_threads = 1

[policy.config]
contract = "velocity_g1_history"
control_frequency_hz = 50

[robot]
config_path = "configs/robots/unitree_g1_35dof_wbc_agile.toml"

[comm]
frequency_hz = 50
topics = { joint_state = "unitree/g1/joint_state", imu = "unitree/g1/imu", joint_target_command = "unitree/g1/command/joint_position" }

[runtime]
# Staged locomotion demo: stand -> accelerate -> right turn -> run -> settle.
# Negative yaw-rate is the right-turn command in the current showcase setup.
max_ticks = 400

[[runtime.velocity_schedule.segments]]
duration_secs = 2.0
start = [0.0, 0.0, 0.0]
end = [0.6, 0.0, 0.0]

[[runtime.velocity_schedule.segments]]
duration_secs = 1.0
start = [0.6, 0.0, -1.5707964]
end = [0.6, 0.0, -1.5707964]

[[runtime.velocity_schedule.segments]]
duration_secs = 3.0
start = [0.6, 0.0, 0.0]
end = [1.0, 0.0, 0.0]

[[runtime.velocity_schedule.segments]]
duration_secs = 1.0
start = [1.0, 0.0, 0.0]
end = [0.0, 0.0, 0.0]
