# BFM-Zero policy on Unitree G1 (29 DOF).
#
# BFM-Zero (CMU, CC BY-NC 4.0) publishes a promptable ONNX policy plus latent
# context files on its public deploy path. This config targets the real G1
# tracking contract wired in `robowbc-ort`.
#
# ## Preparing assets
#
# 1. Download the upstream BFM-Zero `model/` folder after accepting the Hugging Face terms.
# 2. Convert it into RoboWBC's normalized layout:
#
#      python scripts/prepare_bfm_zero_assets.py #          --source /path/to/BFM-Zero/model #          --output models/bfm_zero
#
#    The script copies the exported ONNX checkpoint to
#    `models/bfm_zero/bfm_zero_g1.onnx` and converts `zs_walking.pkl` into
#    `models/bfm_zero/zs_walking.npy`.
#
# 3. Run:
#
#      robowbc run --config configs/bfm_zero_g1.toml

[policy]
name = "bfm_zero"

[policy.config]
contract = "g1_tracking"
action_rescale = 5.0

[policy.config.model]
model_path = "models/bfm_zero/bfm_zero_g1.onnx"
execution_provider = { type = "cpu" }
optimization_level = "extended"
num_threads = 1

[policy.config.tracking]
context_path = "models/bfm_zero/zs_walking.npy"
gamma = 0.8
window_size = 3

# Switch to CUDA once the checkpoint is validated on your machine:
# execution_provider = { type = "cuda", device_id = 0 }

[robot]
config_path = "configs/robots/unitree_g1.toml"

[comm]
frequency_hz = 50
topics = { joint_state = "unitree/g1/joint_state", imu = "unitree/g1/imu", joint_target_command = "unitree/g1/command/joint_position" }

[runtime]
# The real G1 tracking path advances its latent sequence from the converted
# `tracking.context_path`. `motion_tokens` are ignored unless you explicitly
# pass a full 256D latent override.
motion_tokens = [0.0]
max_ticks = 200
